spring.application.name=Proj-15_Student_Examination_System_InMemoryDB-H2

# Server Port
server.port=8085

# H2 DB Connection Details
spring.datasource.driver-class-name=org.h2.Driver
# Added 'DB_CLOSE_DELAY=-1' to prevent the DB from shutting down when the connection closes
spring.datasource.url=jdbc:h2:~/test
spring.datasource.username=sa
spring.datasource.password=

# H2 Console Configuration
spring.h2.console.enabled=true
# Setting a fixed path for the console (optional but recommended)
spring.h2.console.path=/h2-console

# JPA-Hibernate properties
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
